<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>English 6 – Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --pink: #f9c5d1;
      --peach: #fddab0;
      --orange: #f7b267;
      --cream: #fff8f3;
      --glass-bg: rgba(255, 255, 255, 0.55);
      --glass-border: rgba(255, 255, 255, 0.8);
      --shadow-soft: 0 8px 40px rgba(247, 178, 103, 0.18), 0 2px 12px rgba(249, 197, 209, 0.18);
      --shadow-card: 0 20px 60px rgba(200, 100, 80, 0.12), 0 4px 20px rgba(249, 197, 209, 0.25);
      --text-primary: #2d1f1a;
      --text-secondary: #8a6a5e;
      --text-muted: #c4a49c;
      --accent: #e8845a;
      --accent-light: #f5a87b;
      --vocab-tag: #f7b267;
      --example-tag: #f9c5d1;
      --radius: 24px;
      --radius-sm: 14px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      background: linear-gradient(135deg, #fce4ec 0%, #fddab0 45%, #f7c59f 75%, #f7b267 100%);
      background-attachment: fixed;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 20%, rgba(255, 200, 180, 0.4) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(249, 197, 209, 0.3) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── SCREENS ── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      z-index: 1;
    }

    .screen.hidden {
      display: none;
    }

    /* ── HOME SCREEN ── */
    #homeScreen {
      padding: 0;
      overflow-y: auto;
      align-items: center;
      background: transparent;
    }

    .home-header {
      width: 100%;
      padding: 56px 28px 28px;
      text-align: center;
    }

    .app-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.5px;
      margin-bottom: 20px;
    }

    .app-title {
      font-family: 'Fraunces', serif;
      font-size: clamp(32px, 9vw, 52px);
      font-weight: 300;
      color: var(--text-primary);
      line-height: 1.1;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .app-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 400;
      margin-bottom: 0;
      letter-spacing: 0.2px;
    }

    .unit-grid {
      width: 100%;
      padding: 12px 20px 32px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
      max-width: 700px;
      margin: 0 auto;
    }

    .unit-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: var(--radius);
      padding: 22px 22px 18px;
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(.34, 1.56, .64, 1), box-shadow 0.25s ease;
      box-shadow: var(--shadow-soft);
      position: relative;
      overflow: hidden;
    }

    .unit-card::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.6) 0%, transparent 70%);
      border-radius: 50%;
    }

    .unit-card:active {
      transform: scale(0.97);
    }

    @media (hover: hover) {
      .unit-card:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-card);
      }
    }

    .unit-emoji {
      font-size: 28px;
      margin-bottom: 10px;
      display: block;
    }

    .unit-number {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .unit-name {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-size: 19px;
      color: var(--text-primary);
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .unit-grammar {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.4;
      margin-bottom: 14px;
    }

    .unit-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .unit-count {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .unit-progress-bar {
      height: 3px;
      flex: 1;
      margin: 0 10px;
      background: rgba(200, 150, 130, 0.2);
      border-radius: 3px;
      overflow: hidden;
    }

    .unit-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--orange), var(--accent));
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .unit-arrow {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--orange), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .unit-arrow svg {
      width: 12px;
      height: 12px;
      fill: white;
    }

    /* ── LEARN SCREEN ── */
    #learnScreen {
      justify-content: center;
      align-items: center;
    }

    /* Top bar */
    .learn-topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 14px 20px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(252, 228, 236, 0.9) 0%, transparent 100%);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .topbar-back {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .topbar-back:active {
      transform: scale(0.9);
    }

    .topbar-back svg {
      width: 16px;
      height: 16px;
    }

    .topbar-title {
      font-family: 'Fraunces', serif;
      font-size: 15px;
      font-weight: 400;
      color: var(--text-primary);
      flex: 1;
      text-align: center;
    }

    .topbar-gear {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }

    .topbar-gear.active {
      transform: rotate(60deg);
    }

    .topbar-gear svg {
      width: 17px;
      height: 17px;
    }

    /* Progress */
    .progress-area {
      position: fixed;
      bottom: 90px;
      left: 0;
      right: 0;
      padding: 0 28px;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      white-space: nowrap;
      min-width: 55px;
      text-align: right;
    }

    .progress-track {
      flex: 1;
      height: 4px;
      background: rgba(200, 150, 130, 0.25);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pink), var(--orange));
      border-radius: 4px;
      transition: width 0.4s cubic-bezier(.4, 0, .2, 1);
    }

    /* Audio button */
    .audio-btn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 100px;
      padding: 10px 22px 10px 14px;
      cursor: pointer;
      z-index: 50;
      box-shadow: 0 4px 24px rgba(200, 100, 80, 0.15);
      transition: transform 0.2s ease;
    }

    .audio-btn:active {
      transform: translateX(-50%) scale(0.95);
    }

    .audio-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--orange), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .audio-icon svg {
      width: 14px;
      height: 14px;
      fill: white;
    }

    .audio-icon.speaking {
      animation: pulse-speak 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse-speak {
      from {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(232, 132, 90, 0.4);
      }

      to {
        transform: scale(1.08);
        box-shadow: 0 0 0 8px rgba(232, 132, 90, 0);
      }
    }

    .audio-waves {
      display: flex;
      gap: 3px;
      align-items: center;
      height: 16px;
    }

    .audio-waves span {
      display: block;
      width: 3px;
      border-radius: 3px;
      background: linear-gradient(to top, var(--orange), var(--accent));
      animation: wave-bar 0.9s ease-in-out infinite alternate;
    }

    .audio-waves span:nth-child(1) {
      height: 6px;
      animation-delay: 0s;
    }

    .audio-waves span:nth-child(2) {
      height: 12px;
      animation-delay: 0.15s;
    }

    .audio-waves span:nth-child(3) {
      height: 9px;
      animation-delay: 0.3s;
    }

    .audio-waves span:nth-child(4) {
      height: 14px;
      animation-delay: 0.1s;
    }

    .audio-waves span:nth-child(5) {
      height: 7px;
      animation-delay: 0.25s;
    }

    @keyframes wave-bar {
      from {
        height: 4px;
        opacity: 0.5;
      }

      to {
        height: 14px;
        opacity: 1;
      }
    }

    .audio-waves.idle span {
      animation: none;
      height: 4px;
      opacity: 0.4;
    }

    .audio-text {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    /* ── FLASHCARD ── */
    .card-scene {
      width: min(88vw, 400px);
      height: min(58vw, 320px);
      perspective: 1200px;
      cursor: pointer;
      position: relative;
      z-index: 10;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(.645, .045, .355, 1.000);
    }

    .card-inner.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 28px 24px;
      box-shadow: var(--shadow-card);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      overflow: hidden;
    }

    .card-face-front {
      background: rgba(255, 255, 255, 0.65);
    }

    .card-face-front::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 160px;
      height: 160px;
      background: radial-gradient(circle, rgba(255, 210, 180, 0.5) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .card-face-back {
      background: rgba(255, 248, 243, 0.72);
      transform: rotateY(180deg);
    }

    .card-face-back::before {
      content: '';
      position: absolute;
      bottom: -50px;
      left: -50px;
      width: 140px;
      height: 140px;
      background: radial-gradient(circle, rgba(249, 197, 209, 0.5) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .card-type-badge {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 100px;
    }

    .badge-vocabulary {
      background: rgba(247, 178, 103, 0.2);
      color: #b87333;
    }

    .badge-example {
      background: rgba(249, 197, 209, 0.3);
      color: #c0607a;
    }

    .card-tap-hint {
      position: absolute;
      bottom: 14px;
      right: 18px;
      font-size: 10px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-english {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: clamp(22px, 6vw, 34px);
      color: var(--text-primary);
      text-align: center;
      line-height: 1.25;
      margin-bottom: 10px;
    }

    .card-phonetic {
      font-size: 14px;
      color: var(--accent);
      text-align: center;
      font-style: italic;
      font-weight: 300;
      letter-spacing: 0.3px;
    }

    .card-vietnamese {
      font-family: 'Fraunces', serif;
      font-weight: 400;
      font-size: clamp(18px, 5vw, 26px);
      color: var(--text-primary);
      text-align: center;
      line-height: 1.3;
      margin-bottom: 12px;
    }

    .card-grammar {
      font-size: 12px;
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.5;
      padding: 8px 12px;
      background: rgba(247, 178, 103, 0.12);
      border-radius: 10px;
      max-width: 90%;
    }

    /* Swipe animation */
    .card-scene.swipe-left .card-inner {
      animation: swipe-out-left 0.3s ease forwards;
    }

    .card-scene.swipe-right .card-inner {
      animation: swipe-out-right 0.3s ease forwards;
    }

    .card-scene.swipe-in-left .card-inner {
      animation: swipe-in-left 0.3s ease forwards;
    }

    .card-scene.swipe-in-right .card-inner {
      animation: swipe-in-right 0.3s ease forwards;
    }

    @keyframes swipe-out-left {
      to {
        opacity: 0;
        transform: translateX(-60px) rotateY(-5deg);
      }
    }

    @keyframes swipe-out-right {
      to {
        opacity: 0;
        transform: translateX(60px) rotateY(5deg);
      }
    }

    @keyframes swipe-in-left {
      from {
        opacity: 0;
        transform: translateX(60px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes swipe-in-right {
      from {
        opacity: 0;
        transform: translateX(-60px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* ── SETTINGS PANEL ── */
    .settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(45, 31, 26, 0.25);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .settings-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .settings-panel {
      position: absolute;
      top: 62px;
      right: 16px;
      width: min(310px, calc(100vw - 32px));
      background: rgba(255, 252, 250, 0.92);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: var(--radius);
      box-shadow: 0 20px 60px rgba(150, 80, 60, 0.2);
      padding: 20px;
      transform: translateY(-10px) scale(0.96);
      transition: transform 0.3s cubic-bezier(.34, 1.56, .64, 1), opacity 0.3s ease;
      opacity: 0;
    }

    .settings-overlay.open .settings-panel {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .settings-title {
      font-family: 'Fraunces', serif;
      font-size: 16px;
      font-weight: 400;
      color: var(--text-primary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .settings-section {
      margin-bottom: 18px;
    }

    .settings-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .settings-unit-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .unit-pill {
      padding: 5px 12px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      border: 1.5px solid rgba(200, 150, 130, 0.3);
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s ease;
      background: transparent;
    }

    .unit-pill.active {
      background: linear-gradient(135deg, var(--orange), var(--accent));
      border-color: transparent;
      color: white;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(200, 150, 130, 0.12);
    }

    .settings-row:last-child {
      border-bottom: none;
    }

    .settings-row-label {
      font-size: 13px;
      color: var(--text-primary);
    }

    /* Toggle */
    .toggle {
      width: 40px;
      height: 22px;
      border-radius: 11px;
      background: rgba(200, 150, 130, 0.25);
      position: relative;
      cursor: pointer;
      transition: background 0.2s ease;
      flex-shrink: 0;
    }

    .toggle.on {
      background: linear-gradient(135deg, var(--orange), var(--accent));
    }

    .toggle::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      transition: transform 0.2s ease;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
    }

    .toggle.on::after {
      transform: translateX(18px);
    }

    /* Speed control */
    .speed-btns {
      display: flex;
      gap: 6px;
    }

    .speed-btn {
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 11px;
      border: 1.5px solid rgba(200, 150, 130, 0.3);
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s ease;
      background: transparent;
    }

    .speed-btn.active {
      background: linear-gradient(135deg, var(--peach), var(--orange));
      border-color: transparent;
      color: var(--text-primary);
      font-weight: 500;
    }

    /* Action buttons */
    .settings-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .action-btn {
      flex: 1;
      padding: 10px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s ease;
    }

    .action-btn-secondary {
      background: rgba(200, 150, 130, 0.12);
      color: var(--text-secondary);
    }

    .action-btn-danger {
      background: rgba(249, 100, 100, 0.08);
      color: #e05555;
    }

    .action-btn:active {
      transform: scale(0.96);
    }

    /* Swipe hint */
    .swipe-hint {
      position: fixed;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      animation: fade-hint 4s ease 1s forwards;
    }

    @keyframes fade-hint {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(6px);
      }

      15% {
        opacity: 0.7;
        transform: translateX(-50%) translateY(0);
      }

      75% {
        opacity: 0.7;
      }

      100% {
        opacity: 0;
      }
    }

    .hint-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Completion screen */
    .completion {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(252, 228, 236, 0.97) 0%, rgba(253, 218, 176, 0.97) 100%);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      text-align: center;
      padding: 40px;
    }

    .completion.hidden {
      display: none;
    }

    .completion.visible {
      animation: fade-in 0.5s ease;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .completion-emoji {
      font-size: 64px;
      margin-bottom: 20px;

    // ═══════════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════════
    let state = {
      unitId: null,
      cards: [],
      index: 0,
      flipped: false,
      showPhonetic: true,
      showVietnamese: true,
      audioSpeed: 1,
      shuffled: false
    };

    const LS_KEY = 'eng6_v2';
    function loadState() {
      try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; }
    }
    function saveState() {
      try { localStorage.setItem(LS_KEY, JSON.stringify({ unitId: state.unitId, index: state.index, showPhonetic: state.showPhonetic, showVietnamese: state.showVietnamese, audioSpeed: state.audioSpeed })); } catch { }
    }

    // ═══════════════════════════════════════════════════════
    // DOM REFS
    // ═══════════════════════════════════════════════════════
    const homeScreen = document.getElementById('homeScreen');
    const learnScreen = document.getElementById('learnScreen');
    const unitGrid = document.getElementById('unitGrid');
    const cardScene = document.getElementById('cardScene');
    const cardInner = document.getElementById('cardInner');
    const cardEnglish = document.getElementById('cardEnglish');
    const cardPhonetic = document.getElementById('cardPhonetic');
    const cardVietnamese = document.getElementById('cardVietnamese');
    const cardGrammar = document.getElementById('cardGrammar');
    const frontBadge = document.getElementById('frontBadge');
    const backBadge = document.getElementById('backBadge');
    const progressFill = document.getElementById('progressFill');
    const progressLabel = document.getElementById('progressLabel');
    const topbarTitle = document.getElementById('topbarTitle');
    const audioBtn = document.getElementById('audioBtn');
    const audioIcon = document.getElementById('audioIcon');
    const audioWaves = document.getElementById('audioWaves');
    const settingsOverlay = document.getElementById('settingsOverlay');
    const settingsUnitList = document.getElementById('settingsUnitList');
    const togglePhonetic = document.getElementById('togglePhonetic');
    const toggleVietnamese = document.getElementById('toggleVietnamese');
    const completionScreen = document.getElementById('completionScreen');
    const completionSub = document.getElementById('completionSub');

    // ═══════════════════════════════════════════════════════
    // HOME SCREEN
    // ═══════════════════════════════════════════════════════
    function renderHome() {
      const saved = loadState();
      unitGrid.innerHTML = '';

      UNITS.forEach(unit => {
        const total = unit.words.length;
        const savedIdx = (saved.unitId === unit.id) ? (saved.index || 0) : 0;
        const pct = total > 0 ? Math.round((savedIdx / total) * 100) : 0;

        const card = document.createElement('div');
        card.className = 'unit-card';
        card.innerHTML = `
      <span class="unit-emoji">${unit.emoji}</span>
      <div class="unit-number">Unit ${unit.id}</div>
      <div class="unit-name">${unit.name}</div>
      <div class="unit-grammar">${unit.grammar}</div>
      <div class="unit-meta">
        <span class="unit-count">${total} thẻ</span>
        <div class="unit-progress-bar"><div class="unit-progress-fill" style="width:${pct}%"></div></div>
        <div class="unit-arrow"><svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"/></svg></div>
      </div>`;
        card.addEventListener('click', () => startUnit(unit.id));
        unitGrid.appendChild(card);
      });
    }

    // ═══════════════════════════════════════════════════════
    // LEARN SCREEN
    // ═══════════════════════════════════════════════════════
    function startUnit(unitId, resumeIdx) {
      const unit = UNITS.find(u => u.id === unitId);
      if (!unit) return;

      const saved = loadState();
      state.unitId = unitId;
      state.cards = [...unit.words];
      state.shuffled = false;
      state.flipped = false;
      state.showPhonetic = saved.showPhonetic !== undefined ? saved.showPhonetic : true;
      state.showVietnamese = saved.showVietnamese !== undefined ? saved.showVietnamese : true;
      state.audioSpeed = saved.audioSpeed || 1;

      if (resumeIdx !== undefined) {
        state.index = resumeIdx;
      } else if (saved.unitId === unitId && saved.index !== undefined) {
        state.index = Math.min(saved.index, state.cards.length - 1);
      } else {
        state.index = 0;
      }

      topbarTitle.textContent = `${unit.emoji} ${unit.name}`;
      togglePhonetic.className = 'toggle' + (state.showPhonetic ? ' on' : '');
      toggleVietnamese.className = 'toggle' + (state.showVietnamese ? ' on' : '');

      document.querySelectorAll('.speed-btn').forEach(b => {
        b.classList.toggle('active', parseFloat(b.dataset.speed) === state.audioSpeed);
      });

      renderSettingsUnits();
      showScreen('learn');
      renderCard(false);
    }

    function showScreen(name) {
      homeScreen.classList.toggle('hidden', name !== 'home');
      learnScreen.classList.toggle('hidden', name !== 'learn');
    }

    function renderCard(animate, direction) {
      const card = state.cards[state.index];
      if (!card) return;

      // Reset flip
      state.flipped = false;
      cardInner.classList.remove('flipped');

      // Badges
      const badgeClass = card.type === 'vocabulary' ? 'badge-vocabulary' : 'badge-example';
      const badgeLabel = card.type === 'vocabulary' ? 'Vocabulary' : 'Example';
      frontBadge.className = 'card-type-badge ' + badgeClass;
      frontBadge.textContent = badgeLabel;
      backBadge.className = 'card-type-badge ' + badgeClass;
      backBadge.textContent = badgeLabel;

      // Front
      cardEnglish.textContent = card.english;
      cardPhonetic.textContent = card.phonetic;
      cardPhonetic.style.display = (state.showPhonetic && card.phonetic) ? 'block' : 'none';

      // Back
      cardVietnamese.textContent = card.vietnamese;
      cardVietnamese.style.display = state.showVietnamese ? 'block' : 'none';

      // Grammar note for vocabulary cards
      const unit = UNITS.find(u => u.id === state.unitId);
      if (card.type === 'vocabulary' && unit) {
        cardGrammar.textContent = '📝 ' + unit.grammar;
        cardGrammar.style.display = 'block';
      } else {
        cardGrammar.style.display = 'none';
      }

      // Progress
      const total = state.cards.length;
      const pct = total > 1 ? ((state.index + 1) / total) * 100 : 100;
      progressFill.style.width = pct + '%';
      progressLabel.textContent = `${state.index + 1} / ${total}`;

      saveState();

      // Animate
      if (animate && direction) {
        const inClass = direction === 'left' ? 'swipe-in-left' : 'swipe-in-right';
        cardScene.classList.add(inClass);
        cardScene.addEventListener('animationend', () => cardScene.classList.remove(inClass), { once: true });
      }

      // Auto-speak
      setTimeout(() => speakCard(), 300);
    }

    function flipCard() {
      state.flipped = !state.flipped;
      cardInner.classList.toggle('flipped', state.flipped);
    }

    function nextCard() {
      if (state.index >= state.cards.length - 1) {
        showCompletion();
        return;
      }
      animateSwipe('left', () => {
        state.index++;
        renderCard(true, 'left');
      });
    }

    function prevCard() {
      if (state.index <= 0) return;
      animateSwipe('right', () => {
        state.index--;
        renderCard(true, 'right');
      });
    }

    function animateSwipe(dir, cb) {
      const outClass = dir === 'left' ? 'swipe-left' : 'swipe-right';
      cardScene.classList.add(outClass);
      cardScene.addEventListener('animationend', () => {
        cardScene.classList.remove(outClass);
        cb();
      }, { once: true });
    }

    // ═══════════════════════════════════════════════════════
    // AUDIO
    // ═══════════════════════════════════════════════════════
    let synth = window.speechSynthesis;
    let speaking = false;

    function speakCard() {
      const card = state.cards[state.index];
      if (!card || !synth) return;
      speak(card.english);
    }

    function speak(text) {
      if (!synth) return;
      synth.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = 'en-US';
      utt.rate = state.audioSpeed;

      utt.onstart = () => {
        speaking = true;
        audioIcon.classList.add('speaking');
        audioWaves.classList.remove('idle');
      };
      utt.onend = utt.onerror = () => {
        speaking = false;
        audioIcon.classList.remove('speaking');
        audioWaves.classList.add('idle');
      };

      synth.speak(utt);
    }

    // ═══════════════════════════════════════════════════════
    // SETTINGS
    // ═══════════════════════════════════════════════════════
    function renderSettingsUnits() {
      settingsUnitList.innerHTML = '';
      UNITS.forEach(u => {
        const pill = document.createElement('div');
        pill.className = 'unit-pill' + (u.id === state.unitId ? ' active' : '');
        pill.textContent = `${u.emoji} U${u.id}`;
        pill.addEventListener('click', () => {
          closeSettings();
          startUnit(u.id, 0);
        });
        settingsUnitList.appendChild(pill);
      });
    }

    function openSettings() {
      renderSettingsUnits();
      settingsOverlay.classList.add('open');
      document.getElementById('gearBtn').classList.add('active');
    }

    function closeSettings() {
      settingsOverlay.classList.remove('open');
      document.getElementById('gearBtn').classList.remove('active');
    }

    // ═══════════════════════════════════════════════════════
    // COMPLETION
    // ═══════════════════════════════════════════════════════
    function showCompletion() {
      const unit = UNITS.find(u => u.id === state.unitId);
      completionSub.textContent = `Bạn đã hoàn thành ${state.cards.length} thẻ trong "${unit.name}"`;
      completionScreen.classList.remove('hidden');
      completionScreen.classList.add('visible');
    }

    // ═══════════════════════════════════════════════════════
    // TOUCH / SWIPE
    // ═══════════════════════════════════════════════════════
    let touchStartX = 0, touchStartY = 0, touchStartTime = 0;

    cardScene.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchStartTime = Date.now();
    }, { passive: true });

    cardScene.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      const dt = Date.now() - touchStartTime;
      const absDx = Math.abs(dx), absDy = Math.abs(dy);

      // Swipe: di chuyển ngang rõ ràng (> 40px) và ngang hơn dọc
      if (absDx > 40 && absDx > absDy * 1.2) {
        if (dx < 0) nextCard(); else prevCard();
        // Tap: không swipe, thời gian ngắn (< 500ms), không di chuyển quá nhiều
      } else if (absDx < 30 && absDy < 30 && dt < 500) {
        flipCard();
      }
    }, { passive: true });

    // Mouse swipe
    let mouseStartX = 0, mouseStartTime = 0, isDragging = false;

    cardScene.addEventListener('mousedown', e => {
      mouseStartX = e.clientX;
      mouseStartTime = Date.now();
      isDragging = false;
    });

    cardScene.addEventListener('mousemove', e => {
      if (Math.abs(e.clientX - mouseStartX) > 5) isDragging = true;
    });

    cardScene.addEventListener('mouseup', e => {
      const dx = e.clientX - mouseStartX;
      const dt = Date.now() - mouseStartTime;
      if (!isDragging && dt < 300) { flipCard(); return; }
      if (Math.abs(dx) > 60) { if (dx < 0) nextCard(); else prevCard(); }
      isDragging = false;
    });

    // ═══════════════════════════════════════════════════════
    // KEYBOARD
    // ═══════════════════════════════════════════════════════
    document.addEventListener('keydown', e => {
      if (learnScreen.classList.contains('hidden')) return;
      if (e.key === 'ArrowRight') nextCard();
      else if (e.key === 'ArrowLeft') prevCard();
      else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
      else if (e.key === 's' || e.key === 'S') speakCard();
    });

    // ═══════════════════════════════════════════════════════
    // EVENTS
    // ═══════════════════════════════════════════════════════
    document.getElementById('backBtn').addEventListener('click', () => {
      synth && synth.cancel();
      closeSettings();
      showScreen('home');
      renderHome();
    });

    document.getElementById('gearBtn').addEventListener('click', () => {
      settingsOverlay.classList.contains('open') ? closeSettings() : openSettings();
    });

    settingsOverlay.addEventListener('click', e => {
      if (e.target === settingsOverlay) closeSettings();
    });

    audioBtn.addEventListener('click', speakCard);

    togglePhonetic.addEventListener('click', () => {
      state.showPhonetic = !state.showPhonetic;
      togglePhonetic.classList.toggle('on', state.showPhonetic);
      cardPhonetic.style.display = (state.showPhonetic && state.cards[state.index]?.phonetic) ? 'block' : 'none';
      saveState();
    });

    toggleVietnamese.addEventListener('click', () => {
      state.showVietnamese = !state.showVietnamese;
      toggleVietnamese.classList.toggle('on', state.showVietnamese);
      if (state.flipped) cardVietnamese.style.display = state.showVietnamese ? 'block' : 'none';
      saveState();
    });

    document.querySelectorAll('.speed-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        state.audioSpeed = parseFloat(btn.dataset.speed);
        document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        saveState();
      });
    });

    document.getElementById('shuffleBtn').addEventListener('click', () => {
      state.cards = [...state.cards].sort(() => Math.random() - 0.5);
      state.index = 0;
      state.shuffled = true;
      closeSettings();
      renderCard(false);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      state.index = 0;
      const unit = UNITS.find(u => u.id === state.unitId);
      state.cards = unit ? [...unit.words] : state.cards;
      closeSettings();
      renderCard(false);
      saveState();
    });

    document.getElementById('completionBtn').addEventListener('click', () => {
      completionScreen.classList.add('hidden');
      completionScreen.classList.remove('visible');
      state.index = 0;
      const unit = UNITS.find(u => u.id === state.unitId);
      if (unit) state.cards = [...unit.words];
      renderCard(false);
    });

    // ═══════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════
    (function init() {
      renderHome();
      showScreen('home');

      // Resume session
      const saved = loadState();
      if (saved.unitId) {
        const unit = UNITS.find(u => u.id === saved.unitId);
        if (unit) {
          // Start with saved position but don't auto-navigate to learn screen
          // User can tap the unit card to resume
        }
      }
    })();
  </script>
</body>

</html>
