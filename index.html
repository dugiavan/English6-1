<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>English Flash · Units 7–12</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* Light mode orange-pink gradient palette */
  --bg-from: #fff0eb;
  --bg-mid:  #ffd6e7;
  --bg-to:   #ffe8d0;
  --surface:  rgba(255,255,255,0.55);
  --surface2: rgba(255,255,255,0.75);
  --border:  rgba(220,100,120,0.15);
  --border2: rgba(220,100,120,0.28);
  --text:    #3d1a26;
  --text2:   rgba(61,26,38,0.6);
  --text3:   rgba(61,26,38,0.38);
  --radius: 24px;
  --radius-sm: 14px;
  --pill: 999px;
  --ease: cubic-bezier(0.4,0,0.2,1);
  --font-display: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --font-body: 'Outfit', sans-serif;

  /* Unit accent colors — slightly deeper for light bg */
  --c7:  #e8445a;
  --c8:  #d97b00;
  --c9:  #2a9e52;
  --c10: #1a6fd4;
  --c11: #9b3fcf;
  --c12: #e06a00;
  --accent: var(--c7);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: var(--font-body);
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
  color: var(--text);
}

body {
  background: linear-gradient(135deg, var(--bg-from) 0%, var(--bg-mid) 45%, var(--bg-to) 100%);
  background-attachment: fixed;
  min-height: 100vh;
}

/* Soft radial overlays for depth */
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}
body::before {
  width: 55vw; height: 55vw;
  background: radial-gradient(circle, rgba(255,140,160,0.30) 0%, transparent 70%);
  top: -12vw; left: -10vw;
  animation: orbFloat 9s ease-in-out infinite alternate;
}
body::after {
  width: 40vw; height: 40vw;
  background: radial-gradient(circle, rgba(255,180,100,0.28) 0%, transparent 70%);
  bottom: -8vw; right: -8vw;
  animation: orbFloat 11s ease-in-out infinite alternate-reverse;
}
@keyframes orbFloat {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(2vw,1.5vw) scale(1.08); }
}

/* Glow element — subtle in light mode */
#glow {
  position: fixed;
  width: 420px; height: 420px;
  border-radius: 50%;
  filter: blur(100px);
  pointer-events: none; z-index: 0;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0.08;
  background: var(--accent);
  transition: background 0.6s var(--ease);
}

/* TOP BAR */
#top-bar {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 100;
  gap: 10px;
}

#unit-badge {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--accent);
  background: rgba(255,255,255,0.62);
  border: 1px solid var(--border2);
  border-radius: var(--pill);
  padding: 6px 16px;
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 2px 12px rgba(220,80,100,0.1);
  transition: color 0.4s, border-color 0.4s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 65vw;
}

#menu-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  border: 1px solid var(--border2);
  background: rgba(255,255,255,0.62);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 2px 12px rgba(220,80,100,0.1);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text2);
  flex-shrink: 0;
  transition: transform 0.15s, background 0.15s;
}
#menu-btn:active { transform: scale(0.9); background: var(--surface2); }

/* PROGRESS */
#progress-wrap {
  position: fixed; top: 70px; left: 20px; right: 20px;
  z-index: 100;
  display: flex; align-items: center; gap: 10px;
}
#progress-track {
  flex: 1; height: 4px;
  background: rgba(220,100,120,0.14);
  border-radius: var(--pill);
  overflow: hidden;
}
#progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #ff9f7f);
  border-radius: var(--pill);
  transition: width 0.5s var(--ease), background 0.4s;
  box-shadow: 0 0 6px rgba(220,100,120,0.4);
}
#progress-text {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text3);
  min-width: 40px;
  text-align: right;
}

/* APP SHELL */
#app {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 1;
  padding: 0 20px;
}

#learn-area {
  display: flex; flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 480px;  /* phone/tablet */
}

/* ── Desktop: fixed px sizes, no vw scaling ── */
@media (min-width: 900px) {
  #app { padding: 0 40px; }
  #learn-area { max-width: 560px; }
  .card-face {
    min-height: 240px !important;
    max-height: 300px !important;
    padding: 36px 44px 28px !important;
  }
  .front-word { font-size: 42px !important; letter-spacing: -0.01em !important; }
  .front-word.long { font-size: 24px !important; }
  .back-translation { font-size: 32px !important; }
  .back-translation.long { font-size: 20px !important; }
  .back-sub { font-size: 14px !important; }
  .back-eng-small { font-size: 13px !important; }
  .front-type { font-size: 12px !important; }
  .tap-hint { font-size: 12px !important; }
  #controls { gap: 18px; margin-top: 24px; }
  .ctrl-btn { width: 50px; height: 50px; }
  #audio-btn { width: 60px; height: 60px; }
  #swipe-hints { gap: 24px; margin-top: 16px; }
  .sh-item { font-size: 12px; }
  #progress-wrap { left: 40px; right: 40px; }
  #top-bar { padding: 18px 40px; }
  #unit-badge { font-size: 12px; padding: 7px 18px; }
  #toolbar-panel { width: 320px; }
}

/* ── Tablet (portrait/landscape) ── */
@media (min-width: 600px) and (max-width: 899px) {
  #learn-area { max-width: 540px; }
  .card-face {
    min-height: 220px !important;
    max-height: 300px !important;
    padding: 36px 36px 28px !important;
  }
  .front-word { font-size: clamp(28px, 5vw, 50px) !important; }
  .ctrl-btn { width: 52px; height: 52px; }
  #audio-btn { width: 60px; height: 60px; }
}

/* ── Small Android phones ── */
@media (max-width: 380px) {
  .card-face { padding: 24px 16px 18px !important; }
  .front-word { font-size: clamp(22px, 7.5vw, 40px) !important; }
  #controls { gap: 10px; margin-top: 16px; }
  .ctrl-btn { width: 42px; height: 42px; }
  #audio-btn { width: 50px; height: 50px; }
}

/* CARD */
#card-scene {
  width: 100%;
  perspective: 1400px;
  cursor: pointer;
  user-select: none;
  margin-top: 14px;
}

#card-inner {
  position: relative;
  width: 100%;
  transform-style: preserve-3d;
  transition: transform 0.52s var(--ease);
  border-radius: var(--radius);
}
#card-inner.flipped { transform: rotateY(180deg); }

.card-face {
  width: 100%;
  min-height: min(46vw, 220px);
  max-height: 270px;
  border-radius: var(--radius);
  background: rgba(255,255,255,0.68);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1.5px solid rgba(255,255,255,0.85);
  box-shadow:
    0 2px 0 rgba(255,255,255,0.9) inset,
    0 16px 48px rgba(220,80,100,0.13),
    0 4px 16px rgba(0,0,0,0.06);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 28px 24px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  position: relative;
  overflow: hidden;
}
.card-face::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent), #ff9f7f);
  border-radius: var(--radius) var(--radius) 0 0;
  transition: background 0.4s;
}

#card-back {
  position: absolute; top: 0; left: 0;
  transform: rotateY(180deg);
  background: rgba(255,255,255,0.75);
}

/* CARD CONTENT */
.card-tag {
  position: absolute; top: 14px; left: 14px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  background: rgba(220,80,100,0.08);
  border: 1px solid rgba(220,80,100,0.2);
  padding: 3px 10px;
  border-radius: var(--pill);
  transition: color 0.4s;
}
.card-tag.grammar { color: #1a6fd4; background: rgba(26,111,212,0.08); border-color: rgba(26,111,212,0.2); }
.card-tag.example { color: var(--text3); background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); }

.front-word {
  font-family: var(--font-display);
  font-size: clamp(28px, 8vw, 52px);
  font-weight: 800;
  color: var(--text);
  text-align: center;
  line-height: 1.15;
  letter-spacing: -0.01em;
}
.front-word.long { font-size: clamp(17px, 5vw, 28px); letter-spacing: 0; }

.front-type {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent);
  margin-top: 8px;
  letter-spacing: 0.06em;
  transition: color 0.4s;
}

.tap-hint {
  margin-top: 16px;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.04em;
  display: flex; align-items: center; gap: 5px;
}

/* BACK */
.back-translation {
  font-family: var(--font-display);
  font-size: clamp(22px, 6vw, 36px);
  font-weight: 700;
  color: var(--text);
  text-align: center;
  line-height: 1.3;
}
.back-translation.long { font-size: clamp(14px, 4vw, 22px); font-weight: 400; }

.back-sub {
  font-size: 13px;
  color: var(--text2);
  text-align: center;
  margin-top: 10px;
  line-height: 1.6;
  font-style: italic;
}

.back-eng-small {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text3);
  text-align: center;
  margin-top: 12px;
}

/* Swipe animation */
#card-scene.swipe-left  { animation: swLeft  0.3s var(--ease); }
#card-scene.swipe-right { animation: swRight 0.3s var(--ease); }
@keyframes swLeft  { 0%{transform:translateX(0)}40%{transform:translateX(-16px)}100%{transform:translateX(0)} }
@keyframes swRight { 0%{transform:translateX(0)}40%{transform:translateX(16px)}100%{transform:translateX(0)} }

/* CONTROLS */
#controls {
  display: flex; align-items: center; gap: 14px;
  margin-top: 22px;
}

.ctrl-btn {
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 1.5px solid rgba(220,100,120,0.2);
  background: rgba(255,255,255,0.62);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 2px 10px rgba(220,80,100,0.1);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text2);
  transition: transform 0.15s, background 0.15s, color 0.15s, box-shadow 0.15s;
}
.ctrl-btn:active { transform: scale(0.88); }
.ctrl-btn:hover  { background: rgba(255,255,255,0.85); color: var(--text); box-shadow: 0 4px 16px rgba(220,80,100,0.16); }

#audio-btn {
  width: 56px; height: 56px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 4px 16px rgba(220,80,100,0.18);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--accent);
  transition: transform 0.15s, box-shadow 0.2s, color 0.4s, border-color 0.4s;
}
#audio-btn:active { transform: scale(0.88); }
#audio-btn.playing { animation: pulse 0.9s ease-in-out infinite; }
@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 rgba(220,80,100,0.45), 0 4px 16px rgba(220,80,100,0.18); }
  70%  { box-shadow: 0 0 0 14px rgba(220,80,100,0), 0 4px 16px rgba(220,80,100,0.18); }
  100% { box-shadow: 0 0 0 0 rgba(220,80,100,0), 0 4px 16px rgba(220,80,100,0.18); }
}

/* Swipe hints */
#swipe-hints {
  display: flex; gap: 20px; margin-top: 16px;
  align-items: center;
}
.sh-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--text3);
}

/* COMPLETION */
#completion-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 12px;
}
#completion-screen.visible { display: flex; }
#learn-area.hidden { display: none; }

.comp-emoji { font-size: 56px; }
.comp-title {
  font-family: var(--font-display);
  font-size: 36px; font-weight: 800;
  background: linear-gradient(135deg, var(--accent), #ff7c50);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.comp-sub { font-size: 14px; color: var(--text2); line-height: 1.6; max-width: 280px; }
.restart-btn {
  margin-top: 8px;
  padding: 12px 28px;
  border-radius: var(--pill);
  border: 2px solid var(--accent);
  background: transparent;
  color: var(--accent);
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.restart-btn:hover { background: var(--accent); color: #fff; }

/* TOOLBAR */
#toolbar-overlay {
  position: fixed; inset: 0;
  background: rgba(60,20,30,0.25);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity 0.3s var(--ease);
}
#toolbar-overlay.visible { opacity: 1; pointer-events: all; }

#toolbar-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 300px; max-width: 88vw;
  background: rgba(255,240,235,0.92);
  backdrop-filter: blur(32px);
  -webkit-backdrop-filter: blur(32px);
  border-left: 1.5px solid rgba(220,100,120,0.18);
  box-shadow: -8px 0 40px rgba(220,80,100,0.14);
  z-index: 201;
  display: flex; flex-direction: column;
  padding: 0 0 32px;
  transform: translateX(100%);
  transition: transform 0.36s var(--ease);
  overflow-y: auto;
}
#toolbar-panel.open { transform: translateX(0); }

#tb-header {
  padding: 56px 22px 18px;
  border-bottom: 1px solid rgba(220,100,120,0.15);
  margin-bottom: 6px;
}
#tb-title {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 800;
  color: var(--text);
}
#tb-sub { font-size: 12px; color: var(--text3); margin-top: 3px; letter-spacing: 0.04em; }

.tb-section { padding: 14px 22px 6px; }
.tb-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
}

#unit-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 0 22px 6px;
}

.unit-btn {
  padding: 10px 10px 8px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(220,100,120,0.18);
  background: rgba(255,255,255,0.5);
  cursor: pointer;
  text-align: left;
  transition: all 0.15s var(--ease);
}
.unit-btn:active { transform: scale(0.96); }
.unit-btn.active {
  border-color: var(--accent);
  background: rgba(255,255,255,0.78);
  box-shadow: 0 0 0 2px rgba(220,80,100,0.15);
}
.unit-emoji { font-size: 18px; display: block; margin-bottom: 2px; }
.unit-name  { font-size: 10px; color: var(--text); font-weight: 600; line-height: 1.3; font-family: var(--font-display); }
.unit-num   { font-family: var(--font-mono); font-size: 9px; color: var(--text3); }

.tb-divider { height: 1px; background: rgba(220,100,120,0.12); margin: 12px 22px; }

.toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 22px;
  cursor: pointer;
  transition: background 0.15s;
  border-radius: 10px;
}
.toggle-row:active { background: rgba(220,100,120,0.07); }
.toggle-label { font-size: 14px; color: var(--text); }

.toggle-sw {
  width: 42px; height: 24px;
  border-radius: 12px;
  background: rgba(200,160,170,0.3);
  position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
}
.toggle-sw.on { background: var(--accent); }
.toggle-knob {
  position: absolute; top: 3px; left: 3px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  transition: transform 0.2s var(--ease);
}
.toggle-sw.on .toggle-knob { transform: translateX(18px); }

.speed-wrap { padding: 4px 22px 14px; }
.speed-label { font-size: 13px; color: var(--text); margin-bottom: 10px; display: flex; justify-content: space-between; }
.speed-label span { color: var(--accent); font-family: var(--font-mono); }
input[type=range] {
  width: 100%; -webkit-appearance: none; appearance: none;
  height: 4px; border-radius: 4px;
  background: rgba(220,100,120,0.2);
  outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px;
  border-radius: 50%; background: var(--accent);
  box-shadow: 0 0 8px rgba(220,80,100,0.4);
  transition: background 0.3s;
}

.action-btn {
  display: flex; align-items: center; gap: 10px;
  width: calc(100% - 44px);
  margin: 0 22px 10px;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(220,100,120,0.18);
  background: rgba(255,255,255,0.5);
  color: var(--text2);
  font-family: var(--font-body);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
}
.action-btn:hover { background: rgba(255,255,255,0.78); color: var(--text); border-color: rgba(220,100,120,0.3); }
.action-btn.danger { color: #c02040; }
.action-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

/* Grammar card */
.grammar-section {
  width: 100%;
  background: rgba(26,111,212,0.06);
  border: 1px solid rgba(26,111,212,0.18);
  border-radius: 10px;
  padding: 10px 14px;
  margin-top: 10px;
}
.grammar-title {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  color: #1a6fd4;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.grammar-text { font-size: 13px; color: var(--text2); line-height: 1.5; }

/* TOAST */
#toast {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(255,240,235,0.95);
  border: 1px solid rgba(220,100,120,0.25);
  color: var(--text);
  font-size: 13px;
  padding: 10px 20px;
  border-radius: var(--pill);
  box-shadow: 0 4px 20px rgba(220,80,100,0.15);
  z-index: 500;
  opacity: 0;
  transition: opacity 0.25s, transform 0.25s;
  white-space: nowrap;
  pointer-events: none;
  backdrop-filter: blur(12px);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="glow"></div>

<!-- Top bar -->
<div id="top-bar">
  <div id="unit-badge">Loading…</div>
  <button id="menu-btn" aria-label="Menu">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="7"  x2="21" y2="7"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="17" x2="21" y2="17"/>
    </svg>
  </button>
</div>

<!-- Progress -->
<div id="progress-wrap">
  <div id="progress-track"><div id="progress-fill"></div></div>
  <div id="progress-text">0/0</div>
</div>

<!-- App -->
<div id="app">
  <div id="learn-area">
    <div id="card-scene" role="button" aria-label="Flip card">
      <div id="card-inner">
        <div class="card-face" id="card-front">
          <span class="card-tag" id="badge-front">Vocabulary</span>
          <div class="front-word" id="front-word">…</div>

/* ============================================================

   ============================================================ */
const STORAGE_KEY = 'eng_flash_v1';

let state = {
  unitIndex: 0,
  cardIndex: 0,
  isFlipped: false,
  showViet: true,
  showGrammar: true,
  audioSpeed: 1.0,
  cards: []
};

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      unitIndex: state.unitIndex,
      cardIndex: state.cardIndex,
      showViet: state.showViet,
      showGrammar: state.showGrammar,
      audioSpeed: state.audioSpeed
    }));
  } catch(e) {}
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (s.unitIndex !== undefined) state.unitIndex = s.unitIndex;
    if (s.cardIndex !== undefined) state.cardIndex = s.cardIndex;
    if (s.showViet !== undefined) state.showViet = s.showViet;
    if (s.showGrammar !== undefined) state.showGrammar = s.showGrammar;
    if (s.audioSpeed !== undefined) state.audioSpeed = s.audioSpeed;
  } catch(e) {}
}

function buildCards() {
  const unit = UNITS[state.unitIndex];
  const all = [...unit.grammar, ...unit.words];
  state.cards = state.showGrammar ? all : unit.words;
}

/* ============================================================
   ACCENT COLORS
   ============================================================ */
function setAccent(color) {
  document.documentElement.style.setProperty('--accent', color);
  document.getElementById('glow').style.background = color;
}

/* ============================================================
   RENDER
   ============================================================ */
function renderCard() {
  const unit = UNITS[state.unitIndex];
  const total = state.cards.length;
  const idx   = state.cardIndex;

  setAccent(unit.color);

  // Unit badge
  document.getElementById('unit-badge').textContent =
    `Unit ${unit.id} · ${unit.name}`;

  // Progress
  const pct = total === 0 ? 0 : (idx / total) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = idx + '/' + total;

  // Card inner flipped state
  document.getElementById('card-inner').classList.toggle('flipped', state.isFlipped);

  // Completion
  const done = idx >= total;
  document.getElementById('learn-area').classList.toggle('hidden', done);
  document.getElementById('completion-screen').classList.toggle('visible', done);
  if (done) return;

  const card = state.cards[idx];
  const isGrammar = card.type === 'grammar';
  const isExample = card.type === 'example';

  // Front
  const frontWord = document.getElementById('front-word');
  const frontType = document.getElementById('front-type');
  const badgeFront = document.getElementById('badge-front');

  frontWord.textContent = card.en;
  frontWord.className = 'front-word' + (card.en.length > 24 ? ' long' : '');
  frontType.textContent = isGrammar ? '📘 Grammar' : (isExample ? '💬 Example sentence' : '📖 Vocabulary');
  badgeFront.textContent = isGrammar ? 'Grammar' : (isExample ? 'Example' : 'Vocabulary');
  badgeFront.className = 'card-tag' + (isGrammar ? ' grammar' : '') + (isExample ? ' example' : '');

  // Back
  const backTrans = document.getElementById('back-trans');
  const backSub   = document.getElementById('back-sub');
  const backEng   = document.getElementById('back-eng-small');
  const badgeBack = document.getElementById('badge-back');

  badgeBack.textContent = badgeFront.textContent;
  badgeBack.className = badgeFront.className;

  if (state.showViet) {
    backTrans.textContent = card.vn || card.example_vn || '';
    backTrans.className = 'back-translation' + ((card.vn || '').length > 30 ? ' long' : '');
  } else {
    backTrans.textContent = '(hidden)';
    backTrans.className = 'back-translation';
  }

  if (isGrammar) {
    backSub.textContent = card.note || '';
    backEng.textContent = card.example ? `e.g. "${card.example}"` : '';
  } else if (isExample) {
    backSub.textContent = '';
    backEng.textContent = '— ' + card.en;
  } else {
    backSub.textContent = '';
    backEng.textContent = '';
  }
}

function renderUnitGrid() {
  const grid = document.getElementById('unit-grid');
  grid.innerHTML = '';
  UNITS.forEach((u, i) => {
    const btn = document.createElement('button');
    btn.className = 'unit-btn' + (i === state.unitIndex ? ' active' : '');
    btn.style.borderColor = i === state.unitIndex ? u.color : '';
    btn.innerHTML = `<span class="unit-emoji">${u.emoji}</span>
      <span class="unit-num">Unit ${u.id}</span>
      <span class="unit-name">${u.name}</span>`;
    btn.addEventListener('click', () => selectUnit(i));
    grid.appendChild(btn);
  });
}

function syncToggles() {
  document.getElementById('toggle-viet').classList.toggle('on', state.showViet);
  document.getElementById('toggle-grammar').classList.toggle('on', state.showGrammar);
  document.getElementById('speed-slider').value = state.audioSpeed;
  document.getElementById('speed-val').textContent = state.audioSpeed.toFixed(1) + '×';
}

   ============================================================ */
const $scene = document.getElementById('card-scene');
const $inner = document.getElementById('card-inner');

let touchStartX = 0, touchStartY = 0, touchStartTime = 0, isDragging = false;

$scene.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchStartTime = Date.now();
  isDragging = false;
}, { passive: true });

$scene.addEventListener('touchmove', e => {
  if (Math.abs(e.touches[0].clientX - touchStartX) > 10) isDragging = true;
}, { passive: true });

$scene.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dt = Date.now() - touchStartTime;
  const isHoriz = Math.abs(dx) > Math.abs(e.changedTouches[0].clientY - touchStartY) * 1.5;
  if (isDragging && isHoriz && Math.abs(dx) > 50) {
    dx < 0 ? nextCard() : prevCard();
  } else if (!isDragging && dt < 500) {
    flipCard();
  }
}, { passive: true });

let mouseStartX = 0, mouseDown = false, mouseDragged = false;
$scene.addEventListener('mousedown', e => { mouseStartX = e.clientX; mouseDown = true; mouseDragged = false; });
window.addEventListener('mousemove', e => { if (mouseDown && Math.abs(e.clientX - mouseStartX) > 8) mouseDragged = true; });
$scene.addEventListener('mouseup', e => {
  if (!mouseDown) return;
  mouseDown = false;
  const dx = e.clientX - mouseStartX;
  if (mouseDragged && Math.abs(dx) > 50) { dx < 0 ? nextCard() : prevCard(); }
  else if (!mouseDragged) flipCard();
});

document.getElementById('prev-btn').addEventListener('click', e => { e.stopPropagation(); prevCard(); });
document.getElementById('next-btn').addEventListener('click', e => { e.stopPropagation(); nextCard(); });

function flipCard() {
  state.isFlipped = !state.isFlipped;
  $inner.classList.toggle('flipped', state.isFlipped);
  saveState();
}

function nextCard() {
  if (state.cardIndex >= state.cards.length) return;
  animSwipe('left');
  setTimeout(() => {
    state.cardIndex++;
    state.isFlipped = false;
    renderCard();
    saveState();
    if (state.cardIndex < state.cards.length) autoPlay();
  }, 200);
}

function prevCard() {
  if (state.cardIndex <= 0) return;
  animSwipe('right');
  setTimeout(() => {
    state.cardIndex--;
    state.isFlipped = false;
    renderCard();
    saveState();
    autoPlay();
  }, 200);
}

function animSwipe(dir) {
  $scene.classList.remove('swipe-left', 'swipe-right');
  void $scene.offsetWidth;
  $scene.classList.add('swipe-' + dir);
  setTimeout(() => $scene.classList.remove('swipe-left', 'swipe-right'), 350);
}

/* ============================================================
   AUDIO
   ============================================================ */
let synth = window.speechSynthesis;
let voices = [];
let speaking = false;

synth.onvoiceschanged = () => { voices = synth.getVoices(); };
voices = synth.getVoices();

function getEnVoice() {
  const prefs = ['en-US', 'en-GB', 'en-AU', 'en'];
  for (const p of prefs) {
    const v = voices.find(v => v.lang.startsWith(p));
    if (v) return v;
  }
  return voices[0] || null;
}

function speakEN(text) {
  if (!text || !synth) return;
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const v = getEnVoice();
  if (v) u.voice = v;
  u.lang = 'en-US';
  u.rate = state.audioSpeed;
  u.pitch = 1;
  u.onstart = () => { speaking = true; document.getElementById('audio-btn').classList.add('playing'); };
  u.onend = u.onerror = () => { speaking = false; document.getElementById('audio-btn').classList.remove('playing'); };
  synth.speak(u);
}

function playCard() {
  if (state.cardIndex < state.cards.length) {
    speakEN(state.cards[state.cardIndex].en);
  }
}

function autoPlay() { setTimeout(playCard, 300); }

document.getElementById('audio-btn').addEventListener('click', e => { e.stopPropagation(); playCard(); });

/* ============================================================
   TOOLBAR
   ============================================================ */
const $overlay = document.getElementById('toolbar-overlay');
const $panel   = document.getElementById('toolbar-panel');

const openToolbar  = () => { $overlay.classList.add('visible'); $panel.classList.add('open'); renderUnitGrid(); syncToggles(); };
const closeToolbar = () => { $overlay.classList.remove('visible'); $panel.classList.remove('open'); };

document.getElementById('menu-btn').addEventListener('click', openToolbar);
$overlay.addEventListener('click', closeToolbar);

function selectUnit(idx) {
  state.unitIndex = idx;
  state.cardIndex = 0;
  state.isFlipped = false;
  buildCards();
  renderCard();
  autoPlay();
  saveState();
  closeToolbar();
  showToast(`📚 Unit ${UNITS[idx].id}: ${UNITS[idx].name}`);
}

document.getElementById('toggle-viet-row').addEventListener('click', () => {
  state.showViet = !state.showViet;
  syncToggles();
  renderCard();
  saveState();
  showToast(state.showViet ? '✅ Vietnamese shown' : '🙈 Vietnamese hidden');
});

document.getElementById('toggle-grammar-row').addEventListener('click', () => {
  state.showGrammar = !state.showGrammar;
  buildCards();
  if (state.cardIndex >= state.cards.length) state.cardIndex = 0;
  syncToggles();
  renderCard();
  saveState();
  showToast(state.showGrammar ? '✅ Grammar cards included' : '🙈 Grammar cards hidden');
});

document.getElementById('speed-slider').addEventListener('input', e => {
  state.audioSpeed = parseFloat(e.target.value);
  document.getElementById('speed-val').textContent = state.audioSpeed.toFixed(1) + '×';
  saveState();
});

document.getElementById('btn-shuffle').addEventListener('click', () => {
  const arr = [...state.cards];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  state.cards = arr;
  state.cardIndex = 0;
  state.isFlipped = false;
  renderCard();
  saveState();
  closeToolbar();
  showToast('🔀 Cards shuffled!');
  autoPlay();
});

document.getElementById('btn-reset').addEventListener('click', () => {
  state.cardIndex = 0;
  state.isFlipped = false;
  buildCards();
  renderCard();
  saveState();
  closeToolbar();
  showToast('🔄 Progress reset');
  autoPlay();
});

document.getElementById('restart-btn').addEventListener('click', () => {
  state.cardIndex = 0;
  state.isFlipped = false;
  buildCards();
  renderCard();
  saveState();
  autoPlay();
});

/* ============================================================
   TOAST
   ============================================================ */
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ============================================================
   KEYBOARD
   ============================================================ */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch(e.key) {
    case 'ArrowRight': nextCard(); break;
    case 'ArrowLeft': prevCard(); break;
    case ' ': e.preventDefault(); flipCard(); break;
    case 's': case 'S': playCard(); break;
    case 'Escape': closeToolbar(); break;
  }
});

/* ============================================================
   INIT
   ============================================================ */
function init() {
  loadState();
  if (state.unitIndex >= UNITS.length) state.unitIndex = 0;
  buildCards();
  if (state.cardIndex >= state.cards.length) state.cardIndex = 0;
  renderCard();
  syncToggles();
  setTimeout(playCard, 900);
}

init();
</script>
</body>
</html>
